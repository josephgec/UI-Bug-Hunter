<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>UI Bug Hunter Recorder</title>
    <style>
      body { width: 280px; font-family: system-ui, sans-serif; margin: 0; padding: 16px; }
      h1 { font-size: 14px; margin: 0 0 12px; }
      button { width: 100%; padding: 8px 12px; border: 1px solid #d0d7de; border-radius: 6px; background: #f6f8fa; cursor: pointer; margin-bottom: 8px; }
      button.primary { background: #1a73e8; color: white; border-color: #1a73e8; }
      pre { font-size: 11px; max-height: 220px; overflow: auto; background: #f6f8fa; padding: 8px; border-radius: 6px; }
      .status { font-size: 12px; color: #57606a; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <h1>UI Bug Hunter — Recorder</h1>
    <div class="status" id="status">idle</div>
    <button id="start" class="primary">Start recording</button>
    <button id="stop">Stop &amp; copy JSON</button>
    <button id="clear">Clear</button>
    <pre id="output"></pre>
    <script src="popup.js"></script>
  </body>
</html>
